services:
  db:
    image: postgres:15-alpine
    container_name: TV_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: TVshow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgressql/data
      - ./init.sql:/docker-entrypoint-initdb/init.sql
volumes:
  pgdata: